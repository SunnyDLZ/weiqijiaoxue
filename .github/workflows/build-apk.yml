name: 构建围棋教学 APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'weiqi-app/**'
      - 'weiqi-apk/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-36
            build-tools;36.1.0

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        working-directory: weiqi-apk
        run: npm install --no-audit --no-fund

      - name: 同步 Web 资源到 Android
        working-directory: weiqi-apk
        run: npx cap copy android

      - name: 确保 gradlew 可执行
        working-directory: weiqi-apk/android
        run: chmod +x gradlew

      - name: 构建 Debug APK
        working-directory: weiqi-apk/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 重命名 APK
        id: rename
        run: |
          APK_DIR="weiqi-apk/android/app/build/outputs/apk/debug"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          NEW_NAME="weiqi-debug-${TIMESTAMP}.apk"
          mv "$APK_DIR/app-debug.apk" "$APK_DIR/$NEW_NAME"
          echo "apk_path=$APK_DIR/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: 上传 APK 制品
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: 输出 APK 大小
        run: |
          SIZE=$(stat -c%s "${{ steps.rename.outputs.apk_path }}")
          echo "APK 大小: $((SIZE / 1024)) KB"
