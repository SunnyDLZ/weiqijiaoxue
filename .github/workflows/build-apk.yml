name: 构建围棋教学 APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'weiqi-app/**'
      - 'weiqi-apk/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: 构建 Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK 组件
        shell: bash
        run: |
          set +e
          echo "=== 环境变量 ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          echo ""
          echo "=== 寻找 sdkmanager ==="
          SDKMANAGER=""
          for p in \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_HOME/cmdline-tools/bin/sdkmanager" \
            "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"; do
            if [ -f "$p" ]; then SDKMANAGER="$p"; break; fi
          done
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name sdkmanager 2>/dev/null | head -1)
          fi
          echo "sdkmanager: $SDKMANAGER"
          if [ -z "$SDKMANAGER" ]; then
            echo "未找到 sdkmanager，列出 ANDROID_HOME 内容："
            ls -la "$ANDROID_HOME" 2>/dev/null
            ls -la "$ANDROID_HOME/cmdline-tools" 2>/dev/null
          fi
          echo ""
          echo "=== 已安装的 platforms ==="
          ls "$ANDROID_HOME/platforms" 2>/dev/null || echo "无 platforms 目录"
          echo ""
          echo "=== 已安装的 build-tools ==="
          ls "$ANDROID_HOME/build-tools" 2>/dev/null || echo "无 build-tools 目录"
          echo ""
          echo "=== 接受 licenses 并安装 android-36 + build-tools;36.1.0 ==="
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1
          yes | "$SDKMANAGER" "platforms;android-36" "build-tools;36.1.0" 2>&1 | tail -30
          INSTALL_EXIT=$?
          if [ $INSTALL_EXIT -ne 0 ]; then
            echo "⚠️ 安装 android-36/build-tools;36.1.0 失败 (exit=$INSTALL_EXIT)，尝试备选版本..."
            echo "=== 可用的 build-tools 3x ==="
            "$SDKMANAGER" --list 2>/dev/null | grep -E "build-tools;3[0-9]" | head -20
            echo "=== 可用的 platforms android-3x ==="
            "$SDKMANAGER" --list 2>/dev/null | grep -E "platforms;android-3[0-9]" | head -20
            echo "尝试 build-tools;36.0.0..."
            yes | "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -20 || true
          fi
          echo ""
          echo "=== 安装后已安装组件 ==="
          "$SDKMANAGER" --list_installed 2>/dev/null || ls "$ANDROID_HOME/platforms" "$ANDROID_HOME/build-tools" 2>/dev/null

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 安装依赖
        working-directory: weiqi-apk
        run: npm install --no-audit --no-fund

      - name: 同步 Web 资源到 Android
        working-directory: weiqi-apk
        run: npx cap copy android

      - name: 确保 gradlew 可执行
        working-directory: weiqi-apk/android
        run: chmod +x gradlew

      - name: 构建 Debug APK
        working-directory: weiqi-apk/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 重命名 APK
        id: rename
        run: |
          APK_DIR="weiqi-apk/android/app/build/outputs/apk/debug"
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          NEW_NAME="weiqi-debug-${TIMESTAMP}.apk"
          mv "$APK_DIR/app-debug.apk" "$APK_DIR/$NEW_NAME"
          echo "apk_path=$APK_DIR/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "apk_name=$NEW_NAME" >> $GITHUB_OUTPUT

      - name: 上传 APK 制品
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: ${{ steps.rename.outputs.apk_path }}
          retention-days: 30
          if-no-files-found: error

      - name: 输出 APK 大小
        run: |
          SIZE=$(stat -c%s "${{ steps.rename.outputs.apk_path }}")
          echo "APK 大小: $((SIZE / 1024)) KB"
